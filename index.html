<!DOCTYPE html>
<html>
<head>
  <title>Spin Wheel</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #1a0033, #000);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 { margin-top: 20px; }

    canvas {
      margin-top: 20px;
      border-radius: 50%;
      box-shadow: 0 0 25px gold;
    }

    #pointer {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 30px solid gold;
      margin: auto;
      position: relative;
      top: 30px;
      z-index: 2;
    }

    button {
      margin: 10px;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #settings {
      display: none;
      background: #111;
      padding: 15px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      padding: 5px;
      margin: 5px;
      width: 250px;
    }
  </style>
</head>

<body>

<h1>🎡 SPIN THE WHEEL</h1>

<div id="pointer"></div>
<canvas id="wheel" width="400" height="400"></canvas>

<br>
<button onclick="spin()">SPIN</button>
<button onclick="toggleSettings()">⚙️ Settings</button>

<div id="settings">
  <p>Names (comma separated):</p>
  <input id="namesInput" value="A,B,C,D,E,F">
  <br>
  <p>Preset results (optional):</p>
  <input id="presetInput" placeholder="A,C,B">
  <br>
  <button onclick="applySettings()">Apply</button>
</div>

<audio id="tick" src="https://www.soundjay.com/mechanical/sounds/click-07.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let names = ["A","B","C","D","E","F"];
let colors = ["#ff0000","#ff6600","#ffcc00","#33cc33","#00cccc","#0066cc","#9900cc","#ff0099"];

let predetermined = [];
let index = 0;

let angle = 0;
let spinning = false;

function drawWheel() {
  let arc = (2 * Math.PI) / names.length;

  for (let i = 0; i < names.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * arc + angle, (i + 1) * arc + angle);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(i * arc + arc / 2 + angle);
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText(names[i], 100, 5);
    ctx.restore();
  }
}

function spin() {
  if (spinning) return;
  spinning = true;

  let result;

  if (predetermined.length > 0) {
    result = predetermined[index];
    index = (index + 1) % predetermined.length;
  } else {
    result = names[Math.floor(Math.random() * names.length)];
  }

  let resultIndex = names.indexOf(result);
  let arc = (2 * Math.PI) / names.length;

  let targetAngle = (3 * Math.PI / 2) - (resultIndex * arc + arc / 2);

  let spinTime = 0;
  let spinDuration = 4000;

  function animate() {
    spinTime += 30;
    let ease = 1 - Math.pow(1 - spinTime / spinDuration, 3);
    angle = ease * (10 * Math.PI + targetAngle);

    ctx.clearRect(0, 0, 400, 400);
    drawWheel();

    document.getElementById("tick").play();

    if (spinTime < spinDuration) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      document.getElementById("win").play();
    }
  }

  animate();
}

function toggleSettings() {
  let s = document.getElementById("settings");
  s.style.display = s.style.display === "none" ? "block" : "none";
}

function applySettings() {
  let newNames = document.getElementById("namesInput").value.split(",");

  if (newNames.length < 4 || newNames.length > 10) {
    alert("Choose between 4 and 10 options");
    return;
  }

  names = newNames.map(n => n.trim());
  predetermined = document.getElementById("presetInput").value
    .split(",")
    .map(n => n.trim())
    .filter(n => n);

  index = 0;
  angle = 0;

  ctx.clearRect(0, 0, 400, 400);
  drawWheel();
}

drawWheel();
</script>

</body>
</html>
